<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratio Quest: The Lost City</title>
    <style>
        :root {
            --gold: #f1c40f;
            --stone: #34495e;
            --jungle: #27ae60;
            --danger: #e74c3c;
            --sky: #3498db;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e272e, #2f3640);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #fireworksCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 3px solid var(--gold);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2em;
            color: var(--gold);
        }

        .lives { color: var(--danger); letter-spacing: 3px; }

        .quest-map {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .map-dot {
            width: 15px; height: 15px;
            background: #444;
            border-radius: 50%;
            border: 2px solid #666;
        }

        .map-dot.active { background: var(--gold); border-color: white; box-shadow: 0 0 10px var(--gold); }
        .map-dot.finished { background: var(--jungle); border-color: white; }

        .problem-text {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            font-size: 1.1em;
            margin-bottom: 20px;
            min-height: 80px;
            border-left: 4px solid var(--sky);
        }

        input[type="number"] {
            width: 80%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn {
            background: var(--jungle);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
            width: 100%;
        }

        .btn:hover { transform: scale(1.05); background: #2ecc71; }
        .btn:active { transform: scale(0.95); }

        #hintArea { margin-top: 15px; }
        .hint-bubble {
            background: var(--stone);
            color: #bdc3c7;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 5px;
            border-left: 3px solid var(--gold);
            animation: slideIn 0.3s ease-out;
        }

        /* Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<canvas id="fireworksCanvas"></canvas>

<div class="game-card" id="gameCard">
    <div class="stats-bar">
        <div>Score: <span id="score">0</span></div>
        <div class="lives" id="livesDisplay">❤️❤️❤️</div>
    </div>

    <div class="quest-map" id="questMap"></div>

    <div id="game-content">
        <div class="problem-text" id="problemDisplay">
            Loading Quest...
        </div>

        <input type="number" id="userAnswer" placeholder="Enter Answer">
        
        <button class="btn" id="actionBtn" onclick="submitAnswer()">Submit Answer</button>
        <button class="btn hidden" id="nextBtn" onclick="nextLevel()">Advance to Next Room &rarr;</button>

        <div id="hintArea"></div>
    </div>
</div>

<script>
    const levels = [
        {
            q: "The temple door has 3 sun symbols for every 2 moon symbols. If there are 12 sun symbols, how many moon symbols are there?",
            a: 8,
            hints: ["Sun symbols increased from 3 to 12. What was the multiplier? (12 ÷ 3 = ?)", "Multiply the 2 moon symbols by that same multiplier."]
        },
        {
            q: "To mix the magic potion, you need 4 parts dragon scale to 7 parts spider silk. If you have 28 parts spider silk, how many dragon scales do you need?",
            a: 16,
            hints: ["How many times did the spider silk increase? (28 ÷ 7 = ?)", "Multiply the 4 dragon scales by that multiplier (4 × ?)"]
        },
        {
            q: "A treasure chest's gold-to-silver ratio is 5:3. If there are 40 coins in total, how many are silver?",
            a: 15,
            hints: ["First find the total parts: 5 + 3 = 8.", "Find the value of 1 part: 40 coins ÷ 8 parts = ?", "Multiply the 3 silver parts by the value of 1 part."]
        },
        {
            q: "The map scale is 1:10. If the distance to the city is 50cm on the map, how many cm is it in real life?",
            a: 500,
            hints: ["The ratio 1:10 means real life is 10 times bigger than the map.", "Calculate 50 × 10."]
        }
    ];

    let currentLevel = 0;
    let score = 0;
    let lives = 3;
    let wrongInRow = 0;

    // Initialize Map
    const mapEl = document.getElementById('questMap');
    levels.forEach((_, i) => {
        let dot = document.createElement('div');
        dot.className = 'map-dot';
        dot.id = `dot-${i}`;
        mapEl.appendChild(dot);
    });

    function loadLevel() {
        if (currentLevel >= levels.length) {
            winGame();
            return;
        }

        wrongInRow = 0;
        document.getElementById('problemDisplay').innerText = levels[currentLevel].q;
        document.getElementById('userAnswer').value = '';
        document.getElementById('userAnswer').disabled = false;
        document.getElementById('hintArea').innerHTML = '';
        document.getElementById('actionBtn').classList.remove('hidden');
        document.getElementById('nextBtn').classList.add('hidden');
        
        // Update Map
        document.querySelectorAll('.map-dot').forEach((d, i) => {
            d.className = i < currentLevel ? 'map-dot finished' : (i === currentLevel ? 'map-dot active' : 'map-dot');
        });
    }

    function submitAnswer() {
        const val = parseFloat(document.getElementById('userAnswer').value);
        const card = document.getElementById('gameCard');
        
        if (val === levels[currentLevel].a) {
            // Success
            score += (100 - (wrongInRow * 20));
            document.getElementById('score').innerText = score;
            launchFireworks();
            
            document.getElementById('userAnswer').disabled = true;
            document.getElementById('actionBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
            document.getElementById('problemDisplay').innerText = "Correct! The path is clear!";
        } else {
            // Wrong
            wrongInRow++;
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);

            if (wrongInRow > 0 && wrongInRow <= levels[currentLevel].hints.length) {
                const h = document.createElement('div');
                h.className = 'hint-bubble';
                h.innerText = `💡 Hint: ${levels[currentLevel].hints[wrongInRow-1]}`;
                document.getElementById('hintArea').appendChild(h);
            }

            if (wrongInRow > levels[currentLevel].hints.length) {
                lives--;
                updateLives();
                if (lives <= 0) gameOver();
            }
        }
    }

    function updateLives() {
        let hearts = "";
        for(let i=0; i<3; i++) hearts += (i < lives) ? "❤️" : "🖤";
        document.getElementById('livesDisplay').innerText = hearts;
    }

    function nextLevel() {
        currentLevel++;
        loadLevel();
    }

    function gameOver() {
        document.getElementById('game-content').innerHTML = `
            <h2 style="color:var(--danger)">GAME OVER</h2>
            <p>The jungle has reclaimed the quest.</p>
            <button class="btn" onclick="location.reload()">Try Quest Again</button>
        `;
    }

    function winGame() {
        document.getElementById('game-content').innerHTML = `
            <h2 style="color:var(--gold)">🏆 QUEST COMPLETE!</h2>
            <p>You found the Lost City of Ratios!</p>
            <h3 style="font-size:2em">Final Score: ${score}</h3>
            <button class="btn" onclick="location.reload()">Play Again</button>
        `;
    }

    // --- FIREWORKS ---
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class P {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.v = {x: (Math.random()-0.5)*12, y: (Math.random()-0.5)*12};
            this.a = 1; this.c = `hsl(${Math.random()*360}, 100%, 50%)`;
        }
        draw() {
            ctx.globalAlpha = this.a;
            ctx.fillStyle = this.c;
            ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
        }
        update() { this.x += this.v.x; this.y += this.v.y; this.v.y += 0.05; this.a -= 0.01; }
    }

    function launchFireworks() {
        for(let i=0; i<80; i++) particles.push(new P(canvas.width/2, canvas.height/2));
        anim();
    }

    function anim() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles = particles.filter(p => p.a > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        if(particles.length > 0) requestAnimationFrame(anim);
    }

    loadLevel();
</script>
</body>
</html>

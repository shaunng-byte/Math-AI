<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratio Problem Solver - Interactive Tutor</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f5a623;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }

        .problem-box {
            background: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            margin-bottom: 20px;
            font-size: 1.1em;
            line-height: 1.5;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="number"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #357abd; }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            animation: fadeIn 0.4s;
        }

        .hint-step {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
        }

        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ratio Tutor</h1>
    <p class="subtitle">Solve the problem below. If you get stuck, I'll help you step-by-step!</p>
    
    <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <div id="game-area">
        <div class="problem-box" id="problemText">
            Loading problem...
        </div>

        <div class="input-area">
            <label id="inputLabel" for="userAnswer">Your Answer:</label>
            <input type="number" id="userAnswer" placeholder="Enter number...">
            <button onclick="checkAnswer()">Check Answer</button>
            <button id="nextBtn" style="display:none; background-color: var(--success);" onclick="nextProblem()">Next Problem &rarr;</button>
        </div>

        <div id="feedback" class="feedback"></div>
        <div id="hintArea"></div>
    </div>
</div>

<script>
    const problems = [
        {
            text: "A recipe for fruit punch uses a ratio of 2 cups of orange juice to 5 cups of lemonade. If you use 10 cups of orange juice, how many cups of lemonade do you need?",
            answer: 25,
            hints: [
                "Think about the multiplier. How many times did the orange juice increase? (10 ÷ 2 = ?)",
                "The orange juice increased by 5 times. To keep the ratio, we must multiply the lemonade by the same number.",
                "Calculate: 5 cups of lemonade × 5. What is the total?"
            ]
        },
        {
            text: "In a class, the ratio of boys to girls is 3:4. If there are 28 students in total, how many girls are there?",
            answer: 16,
            hints: [
                "First, find the total 'parts' in the ratio. 3 (boys) + 4 (girls) = how many parts?",
                "If 7 parts = 28 students, how many students are in 1 part? (28 ÷ 7 = ?)",
                "One part equals 4 students. Now, multiply the number of 'girl parts' (4) by this value."
            ]
        },
        {
            text: "The ratio of blue marbles to red marbles in a bag is 1:3. If there are 12 red marbles, how many marbles are in the bag altogether?",
            answer: 16,
            hints: [
                "First, find how many blue marbles there are. If 3 parts = 12, what is 1 part?",
                "There are 4 blue marbles (1 part). Now, add the blue marbles and red marbles together.",
                "Total = 4 (blue) + 12 (red). What is the sum?"
            ]
        }
    ];

    let currentProblemIndex = 0;
    let wrongCount = 0;

    function loadProblem() {
        const problem = problems[currentProblemIndex];
        document.getElementById('problemText').innerText = problem.text;
        document.getElementById('userAnswer').value = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('hintArea').innerHTML = '';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('userAnswer').disabled = false;
        document.getElementById('inputLabel').innerText = "Your Answer:";
        wrongCount = 0;
        updateProgress();
    }

    function updateProgress() {
        const percent = (currentProblemIndex / problems.length) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
    }

    function checkAnswer() {
        const userVal = parseFloat(document.getElementById('userAnswer').value);
        const problem = problems[currentProblemIndex];
        const feedbackDiv = document.getElementById('feedback');
        const hintArea = document.getElementById('hintArea');

        if (isNaN(userVal)) {
            showFeedback("Please enter a number!", "error");
            return;
        }

        if (userVal === problem.answer) {
            showFeedback("Correct! Well done.", "success");
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('userAnswer').disabled = true;
            hintArea.innerHTML = ""; // Clear hints on success
        } else {
            wrongCount++;
            showFeedback("Not quite right. Let's try to break it down.", "error");
            
            // Provide sequential hints
            if (wrongCount <= problem.hints.length) {
                const hintNode = document.createElement('div');
                hintNode.className = 'hint-step';
                hintNode.innerHTML = `<strong>Step ${wrongCount}:</strong> ${problem.hints[wrongCount-1]}`;
                hintArea.appendChild(hintNode);
            }
        }
    }

    function showFeedback(text, type) {
        const feedbackDiv = document.getElementById('feedback');
        feedbackDiv.innerText = text;
        feedbackDiv.className = `feedback ${type}`;
        feedbackDiv.style.display = 'block';
    }

    function nextProblem() {
        currentProblemIndex++;
        if (currentProblemIndex < problems.length) {
            loadProblem();
        } else {
            document.getElementById('game-area').innerHTML = `
                <div class="problem-box" style="text-align:center; border-left:none;">
                    <h2>🎉 All Done!</h2>
                    <p>You've mastered these ratio problems!</p>
                    <button onclick="location.reload()">Restart</button>
                </div>
            `;
            document.getElementById('progressFill').style.width = '100%';
        }
    }

    // Initial Load
    loadProblem();
</script>

</body>
</html>
